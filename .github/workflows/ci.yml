name: ci

# Run the Rust test suite, clippy (warnings denied), and the frontend type-check
# on every push to main and on every pull request. The 640 MB model is never
# downloaded; the real-model integration tests self-skip when it is absent.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A newer push to the same ref cancels an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: rust tests
    # suiron-metal links the Metal and Foundation frameworks via hand-rolled
    # Objective-C FFI, and suiron-cli depends on it, so the workspace only
    # builds on macOS.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  web:
    name: web (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm test
        working-directory: web
